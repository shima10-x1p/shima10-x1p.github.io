{% extends "base.html" %}

{% block title %}著者一覧 | {{ SITENAME }}{% endblock %}

{% block content %}
<section>
    <h1 class="page-title">著者一覧</h1>
    <ul class="category-list">
        {% for author, articles in authors %}
        <li>
            <a href="{{ SITEURL }}/{{ author.url }}">{{ author }}</a>
            <span class="tag-count">({{ articles | count }})</span>
        </li>
        {% endfor %}
    </ul>
</section>
{% endblock %}
