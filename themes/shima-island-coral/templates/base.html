<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}{{ SITENAME }}{% endblock %}</title>
    <meta name="description" content="{% block description %}{{ SITENAME }}{% endblock %}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ SITEURL }}/{{ THEME_STATIC_DIR }}/css/style.css" />
    <link rel="stylesheet" href="{{ SITEURL }}/{{ THEME_STATIC_DIR }}/css/pygments.css" />
    {% if FEED_ALL_ATOM %}
    <link href="{{ SITEURL }}/{{ FEED_ALL_ATOM }}" type="application/atom+xml" rel="alternate" title="{{ SITENAME }} Atom Feed" />
    {% endif %}
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <nav class="site-nav">
            <a href="{{ SITEURL }}/" class="site-brand">{{ SITENAME }}</a>
            <div class="nav-right">
                {% if MENUITEMS %}
                {% for title, link in MENUITEMS %}
                <a href="{{ link }}">{{ title }}</a>
                {% endfor %}
                {% endif %}
                <a href="{{ SITEURL }}/archives.html">アーカイブ</a>
                <a href="{{ SITEURL }}/tags.html">タグ</a>
                <button class="theme-toggle" id="theme-toggle" type="button" aria-label="テーマ切り替え">◐</button>
            </div>
        </nav>
    </header>

    <main class="site-main">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 {{ SITENAME }}</p>
    </footer>

    <script>
    (function() {
        var toggle = document.getElementById('theme-toggle');
        var html = document.documentElement;

        // 保存済みテーマまたはOS設定を適用
        var saved = localStorage.getItem('theme');
        if (saved) {
            html.setAttribute('data-theme', saved);
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            html.setAttribute('data-theme', 'dark');
        }

        toggle.addEventListener('click', function() {
            var current = html.getAttribute('data-theme');
            var next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        });

        // OS設定変更を監視（手動選択がなければ追従）
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
            if (!localStorage.getItem('theme')) {
                html.setAttribute('data-theme', e.matches ? 'dark' : 'light');
            }
        });
    })();
    </script>
</body>
</html>
